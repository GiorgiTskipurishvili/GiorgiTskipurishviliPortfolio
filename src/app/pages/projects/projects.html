<div class="projects">
  <h1>My Projects</h1>

  <div class="project-card" *ngFor="let project of projects">
    
    <img [src]="project.image" alt="project" class="project-img">

    <div class="project-about">
      <h3>{{ project.title }}</h3>


      <a [href]="project.live" target="_blank" class="btn">
        Live Demo →
      </a>
    </div>

  </div>
</div>
